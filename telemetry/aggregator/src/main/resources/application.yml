spring:
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: ru.yandex.practicum.aggregator.broker.AggregatorAvroSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: ru.yandex.practicum.aggregator.broker.SensorEventDeserializer
      auto-offset-reset: earliest
      group-id: aggregator-group

logging:
  level:
    ru.yandex.practicum: DEBUG