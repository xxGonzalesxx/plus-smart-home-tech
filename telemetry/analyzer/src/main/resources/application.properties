spring.sql.init.mode=never

# PostgreSQL Database - ВАША структура
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/smart_home
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Kafka - BootStrap
custom.kafka.bootstrap-servers=localhost:9092

# Kafka - SnapshotConsumer (ВАШИ десериализаторы)
custom.kafka-snapshot.snapshot-consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
custom.kafka-snapshot.snapshot-consumer.value-deserializer=ru.yandex.practicum.analyzer.broker.SensorsSnapshotDeserializer
custom.kafka-snapshot.snapshot-consumer.auto-offset-reset=earliest
custom.kafka-snapshot.snapshot-consumer.group-id=analyzer-snapshot-group

# Kafka - HubEventConsumer (ВАШИ десериализаторы)
custom.kafka-hub-event.hub-event-consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
custom.kafka-hub-event.hub-event-consumer.value-deserializer=ru.yandex.practicum.analyzer.broker.HubEventDeserializer
custom.kafka-hub-event.hub-event-consumer.auto-offset-reset=earliest
custom.kafka-hub-event.hub-event-consumer.group-id=analyzer-hub-group

# gRPC Client
grpc.client.hub-router.address=static://localhost:59090
grpc.client.hub-router.enableKeepAlive=true
grpc.client.hub-router.keepAliveWithoutCalls=true
grpc.client.hub-router.negotiationType=plaintext

# Logging
logging.level.ru.yandex.practicum.analyzer=DEBUG